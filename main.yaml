        device_class: "water"
        unit_of_measurement: "m³"
        accuracy_decimals: 2

    volume_last_hour:
      - pulsarm_channel: 1
        id: water_ch1_last_hour
        device_id: last_hour
        name: "ch1_bathroom_cold"
        device_class: "water"
        unit_of_measurement: "m³"
