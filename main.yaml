        unit_of_measurement: "m³"
        accuracy_decimals: 2
      - pulsarm_channel: 3
        id: water_ch3_indi
        device_id: indication25
        name: "ch3_toilet_cold"
        device_class: "water"
        unit_of_measurement: "m³"
        accuracy_decimals: 2
      - pulsarm_channel: 4
        id: water_ch4_indi
        device_id: indication25
        name: "ch4_toilet_hot"
        device_class: "water"
        unit_of_measurement: "m³"
        accuracy_decimals: 2
      - pulsarm_channel: 5
