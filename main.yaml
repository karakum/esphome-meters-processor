        device_id: indication25
        name: "ch6_shower_hot"
        device_class: "water"
        unit_of_measurement: "m³"
        accuracy_decimals: 2

    volume_last_day:
      - pulsarm_channel: 1
        id: water_ch1_last_day
        device_id: last_day
        name: "ch1_bathroom_cold"
        device_class: "water"
        unit_of_measurement: "m³"
        accuracy_decimals: 2
      - pulsarm_channel: 2
        id: water_ch2_last_day
        device_id: last_day
        name: "ch2_bathroom_hot"
        device_class: "water"
        unit_of_measurement: "m³"
        accuracy_decimals: 2
      - pulsarm_channel: 3
        id: water_ch3_last_day
        device_id: last_day
        name: "ch3_toilet_cold"
        device_class: "water"
        unit_of_measurement: "m³"
        accuracy_decimals: 2
      - pulsarm_channel: 4
        id: water_ch4_last_day
        device_id: last_day
        name: "ch4_toilet_hot"
        device_class: "water"
